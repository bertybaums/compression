# Corpus generation configuration

mindrouter:
  base_url: https://mindrouter.uidaho.edu/v1
  # API key loaded from MINDROUTER_API_KEY env var or .env file
  model: openai/gpt-oss-120b         # used by generate_parallel.py (single model)
  max_concurrent: 16                 # used by generate_parallel.py
  max_retries: 3
  retry_backoff_base: 2.0  # seconds, exponential

  # Client-side global rate limiter used by generate_reasoning.py.
  # MR's enforced cap shows as ~200 req/min and is shared across all campus
  # users. We self-impose a lower ceiling to leave headroom.
  max_req_per_minute: 200
  burst_capacity: 10

  # Teacher ensemble for reasoning-trace generation (used by generate_reasoning.py).
  # Each entry: id, weight (for weighted sampling), max_concurrent (per-teacher
  # semaphore), max_tokens_overhead (added on top of generation.reasoning.max_tokens).
  #
  # Narrowed to 2 teachers after pilot on April 15, 2026:
  #   - gpt-oss-120b: 92% compliant, 0% fail
  #   - gemma-4-26b : 95% compliant, 0% fail (MoE, fast per call)
  # Dropped (pilot): qwen3.5-122b (thinking exhaustion), Nemotron-3-Super-120b
  # (73% fail under concurrency, short outputs), phi4-reasoning:14b (41%
  # compliance), magistral:24b (26% compliance).
  # Start concurrency conservative (half of backend-weighted targets); bump
  # after first ~500 traces if fail rate stays <1% and tok/s has headroom.
  # Defaults targeting ~70 req/min sustained, well under the admin-set
  # 100 req/min MR cap. reasoning_effort=medium on gpt-oss-120b gives ~40%
  # richer content per call vs default-high, with no token-budget concern
  # since MR has no per-account token quota.
  reasoning_teachers:
    - id: openai/gpt-oss-120b
      weight: 15
      max_concurrent: 20
      max_tokens_overhead: 8192
      reasoning_effort: medium
    - id: qwen/qwen3.6-27b
      weight: 85
      max_concurrent: 30
      max_tokens_overhead: 4096
      enable_thinking: false   # ~16x faster than thinking mode; relies on retry loop for compliance

generation:
  # Parallel corpus (English <-> UGF translations)
  parallel:
    input_path: corpus/processed/english_passages.jsonl
    output_path: corpus/processed/parallel_corpus.jsonl
    progress_path: corpus/processed/parallel_progress.json
    max_validation_retries: 4  # re-prompt on vocab violations
    max_tokens: 1024
    temperature: 0.3

  # Pure UGF reasoning traces
  reasoning:
    output_path: corpus/processed/ugf_reasoning.jsonl
    progress_path: corpus/processed/reasoning_progress.json
    max_tokens: 2048
    temperature: 0.7
