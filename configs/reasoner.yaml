# Reasoner model configuration
#
# Active variant: 200M parameter Llama-style decoder with UGF vocabulary.
# Decided April 29, 2026 to start with 200M before considering scaling up.
# A larger 1.5B variant (d_model=2048, n_layers=32) is deferred — see
# memory entry `eval_comparator_strategy.md` for the Sheffer-stroke
# contingency under which we'd revisit.

model:
  d_model: 1024
  n_layers: 16
  n_heads: 16
  n_kv_heads: 4          # GQA: 4 query heads per KV head
  d_ff: 3072             # SwiGLU intermediate (~ d_model * 3)
  max_seq_len: 512       # word-level tokens
  dropout: 0.0
  tie_embeddings: true
  # Approx param count: ~195M (16 layers * ~12M per layer + ~4M tied embeds)

training:
  batch_size: 8
  grad_accum_steps: 8    # effective batch = 64
  max_lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  warmup_steps: 1000
  max_steps: 100000      # ~6 epochs over the current ~1.6M-trace corpus
  gradient_checkpointing: true
  use_amp: true

  log_interval: 50
  save_interval: 5000
  eval_interval: 1000

  # Sample-generation probe runs at this multiple of eval_interval.
  # 5 means: every 5000 steps we generate from the fixed sample prompts.
  sample_probe_every_n_evals: 5

  max_checkpoints: 3

  checkpoint_dir: checkpoints/reasoner
  log_dir: logs/reasoner
  sample_log_dir: logs/reasoner/samples

data:
  # Reasoning traces — generated by teacher LLMs via generate_reasoning.py
  # Schema: {id, ugf_text, content_type, topic, ...}. heldout filter by doc-key.
  train_paths:
    - corpus/processed/ugf_reasoning.jsonl            # main topic-driven corpus
    - corpus/processed/ugf_reasoning_cxbot.jsonl      # counterexample_analysis from cx-bot
    - corpus/processed/ugf_reasoning_misccorpora.jsonl  # analogical_analysis + conditional_analysis

  # Parallel-corpus UGF side — human-authored English translated to UGF via
  # generate_parallel.py. Different distribution from reasoning traces
  # (textbook / gtb scenario register vs teacher-generated reasoning).
  # Schema: {id, english, ugf, ...}. heldout filter by exact passage ID.
  parallel_train_paths:
    - corpus/processed/parallel_corpus.jsonl

  # Per-source held-out validation: the loader builds, for each train path,
  # a parallel "val" dataset using include_only_heldout=True (the same heldout
  # JSON, inverted). No separate val_path needed.
  per_source_val: true

  # Fixed prompts for the sample-generation probe (Layer 1 eval). Empty/missing
  # disables the probe; non-empty enables generation + UNK rate + vocab coverage.
  sample_prompts_path: eval/sets/sample_prompts.jsonl

  dataset_type: reasoning
  num_workers: 4
  heldout_ids_path: corpus/processed/heldout_ids.json

  # Stable-hash-based random val supplement: covers sources where the
  # doc-key heldout doesn't bite (the main `reasoning-NNNNNNN` corpus).
  # 0.05 = 5% of records held out per source. Safe for cxbot/misccorpora/
  # parallel too — at worst, val sets are slightly larger than 5%.
  random_val_fraction: 0.05
