# Reasoner model configuration
# 1.5B param Llama-style decoder with UGF vocabulary

model:
  d_model: 2048
  n_layers: 32
  n_heads: 32
  n_kv_heads: 8
  d_ff: 5504            # SwiGLU intermediate
  max_seq_len: 512       # word-level tokens
  dropout: 0.0
  tie_embeddings: true

training:
  batch_size: 8
  grad_accum_steps: 8    # effective batch = 64
  max_lr: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  warmup_steps: 2000
  max_steps: 200000      # ~2B tokens at 512 * 64 effective batch
  gradient_checkpointing: true
  use_amp: true

  log_interval: 50
  save_interval: 5000
  eval_interval: 1000
  max_checkpoints: 3

  checkpoint_dir: checkpoints/reasoner
  log_dir: logs/reasoner

data:
  train_paths:
    - corpus/processed/ugf_reasoning.jsonl            # main topic-driven corpus (~222K+ as of April 17)
    - corpus/processed/ugf_reasoning_cxbot.jsonl      # counterexample_analysis from cx-bot (4,266)
    # - corpus/processed/ugf_reasoning_misccorpora.jsonl  # UN-COMMENT once misc-corpora translation completes + extraction runs
  val_path: null          # will split from training data later
  dataset_type: reasoning
  num_workers: 4
  # heldout_ids_path is applied to BOTH dataset_types now:
  #  - "parallel": filters by exact passage ID
  #  - "reasoning": filters by doc-key (id.rsplit('-', 1)[0]) so cxbot/misc-corpora
  #    reasoning traces linked to held-out passages are excluded. Main
  #    reasoning-NNNNNNN IDs never collide, so filter is a no-op for them.
  heldout_ids_path: corpus/processed/heldout_ids.json
